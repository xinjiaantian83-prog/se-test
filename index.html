<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SE TEST</title>

<style>
body{
  background:#000;
  color:#fff;
  font-family:sans-serif;
  text-align:center;
}
button{
  font-size:20px;
  margin:8px;
  padding:12px 18px;
}
</style>
</head>

<body>

<h2>SE TEST</h2>

<button onclick="playSE('ok')">決定</button>
<button onclick="playSE('cancel')">キャンセル</button><br>

<button onclick="playSE('jump')">ジャンプ</button>
<button onclick="playSE('damage')">被弾</button><br>

<button onclick="playSE('coin')">コイン</button>
<button onclick="playSE('dead')">死亡</button>

<script>
const SE_PATHS = {
  ok: 'se/ok.wav',
  cancel: 'se/cancel.wav',
  jump: 'se/jump.wav',
  damage: 'se/damage.wav',
  coin: 'se/coin.wav',
  dead: 'se/dead.wav'
};

function playSE(name){
  const path = SE_PATHS[name];
  if(!path) return;

  const s = new Audio(path);
  s.preload = 'auto';
  s.volume = 1.0;
  s.play();
}
</script>

</body>
</html>
